# Quick ANN baseline test config (2 seeds, 5 epochs)
experiment_name: shd_ann_quick
seeds: [42, 123]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: ann_mlp
  kwargs:
    in_features: 5600  # 8 * 700
    hidden_dims: [256, 128]
    num_classes: null
    dropout: 0.1

train:
  epochs: 5
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 20
