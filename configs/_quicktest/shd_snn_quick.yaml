# Quick SNN baseline test config (2 seeds, 5 epochs) for pipeline validation
experiment_name: shd_snn_quick
seeds: [42, 123]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: snn_mlp
  kwargs:
    in_features: null
    hidden_dims: [256, 128]
    num_classes: null
    T: 8
    decay: 0.95
    threshold: 1.0
    beta: 5.0
    encoder: poisson
    input_is_spike_train: true

train:
  epochs: 5
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0
  optimizer: adam
  eval_every: 1
  log_every: 20
