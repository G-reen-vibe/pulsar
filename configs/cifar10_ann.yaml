# CIFAR-10 + ANN baseline (CNN)
experiment_name: cifar10_ann
seeds: [42, 123, 7]

dataset:
  name: cifar10
  kwargs:
    batch_size: 128

model:
  name: ann_cnn
  kwargs:
    in_channels: 3
    num_classes: null
    width: 32
    input_size: 32

train:
  epochs: 30
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 50
