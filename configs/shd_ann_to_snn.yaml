# SHD + ANN-to-SNN conversion baseline
experiment_name: shd_ann_to_snn
seeds: [42, 123, 7]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: ann_to_snn_mlp
  kwargs:
    in_features: 5600  # 8 * 700 (flattened)
    hidden_dims: [256, 128]
    num_classes: null
    T: 16  # inference timesteps for converted SNN
    decay: 0.95
    threshold: 1.0
    beta: 5.0
    dropout: 0.1

train:
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 10
