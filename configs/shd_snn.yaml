# SHD + SNN baseline (MLP, surrogate gradient LIF)
experiment_name: shd_snn
seeds: [42, 123, 7]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: snn_mlp
  kwargs:
    in_features: null  # 700
    hidden_dims: [256, 128]
    num_classes: null  # 20
    T: 8
    decay: 0.95
    threshold: 1.0
    beta: 5.0
    encoder: poisson  # ignored; input is already spikes
    input_is_spike_train: true

train:
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0
  optimizer: adam
  eval_every: 1
  log_every: 10
