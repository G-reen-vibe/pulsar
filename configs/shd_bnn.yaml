# SHD + BNN baseline (MLP, binary activations, no time)
experiment_name: shd_bnn
seeds: [42, 123, 7]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: bnn_mlp
  kwargs:
    in_features: 5600  # 8 * 700 (flattened)
    hidden_dims: [256, 128]
    num_classes: null
    mode: zero_one

train:
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 10
