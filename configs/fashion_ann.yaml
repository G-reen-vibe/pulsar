# Fashion-MNIST + ANN baseline (CNN)
experiment_name: fashion_ann
seeds: [42, 123, 7]

dataset:
  name: fashion
  kwargs:
    batch_size: 128
    flatten: false  # CNN model → image format

model:
  name: ann_cnn
  kwargs:
    in_channels: 1
    num_classes: null
    width: 16
    input_size: 28

train:
  epochs: 15
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 50
