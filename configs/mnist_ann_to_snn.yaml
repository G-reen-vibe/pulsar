# MNIST + ANN-to-SNN conversion baseline
experiment_name: mnist_ann_to_snn
seeds: [42, 123, 7]

dataset:
  name: mnist
  kwargs:
    batch_size: 128
    flatten: false

model:
  name: ann_to_snn_cnn
  kwargs:
    in_channels: 1
    num_classes: null
    width: 16
    input_size: 28
    T: 16  # inference timesteps for SNN
    decay: 0.95
    threshold: 1.0
    beta: 5.0

train:
  epochs: 15
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 50
