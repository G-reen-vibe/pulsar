# SHD + ANN baseline (MLP)
experiment_name: shd_ann
seeds: [42, 123, 7]

dataset:
  name: shd
  kwargs:
    T: 8
    batch_size: 64

model:
  name: ann_mlp
  kwargs:
    in_features: 5600  # 8 * 700 — T * C (input is flattened)
    hidden_dims: [256, 128]
    num_classes: null
    dropout: 0.1

train:
  epochs: 40
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  eval_every: 1
  log_every: 10
